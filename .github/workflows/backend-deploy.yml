name: Backend Deployment to Google Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'agriflow-backend/**'
      - '.github/workflows/backend-deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast2 # Jakarta

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, commodity-service, matching-service, notification-service, payment-service, ai-service, blockchain-service, insurance-service]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Authorize Docker
      run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

    - name: Build and Push Container
      run: |-
        docker build -t "asia-southeast2-docker.pkg.dev/$PROJECT_ID/agriflow/${{ matrix.service }}:$GITHUB_SHA" ./agriflow-backend/services/${{ matrix.service }}
        docker push "asia-southeast2-docker.pkg.dev/$PROJECT_ID/agriflow/${{ matrix.service }}:$GITHUB_SHA"

    - name: Deploy to Cloud Run
      run: |-
        gcloud run deploy ${{ matrix.service }} \
          --image "asia-southeast2-docker.pkg.dev/$PROJECT_ID/agriflow/${{ matrix.service }}:$GITHUB_SHA" \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}"
